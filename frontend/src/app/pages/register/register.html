<div class="min-h-screen bg-black flex items-center justify-center py-12 px-4 pt-20">
  <div class="max-w-md w-full bg-neutral-900 border border-neutral-800 p-8 rounded-lg shadow-2xl">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-black text-white uppercase italic">Registrarse</h2>
      <p class="text-gray-400 mt-2">Creá tu cuenta de socio</p>
    </div>

    @if (errorMessage()) {
      <div class="mb-6 p-4 bg-red-900/50 border border-red-500 text-red-200 rounded text-sm text-center">
        {{ errorMessage() }}
      </div>
    }

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <label class="block text-sm font-bold text-gray-300 mb-2">Nombre Completo</label>
        <input type="text" formControlName="name"
               class="w-full bg-black border border-neutral-700 rounded px-4 py-3 text-white focus:outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600 transition-all"
               placeholder="Juan Pérez">
      </div>

      <div>
        <label class="block text-sm font-bold text-gray-300 mb-2">Correo Electrónico</label>
        <input type="email" formControlName="email"
               class="w-full bg-black border border-neutral-700 rounded px-4 py-3 text-white focus:outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600 transition-all"
               placeholder="tu@email.com">
      </div>

      <div>
        <label class="block text-sm font-bold text-gray-300 mb-2">Contraseña</label>
        <input type="password" formControlName="password"
               class="w-full bg-black border border-neutral-700 rounded px-4 py-3 text-white focus:outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600 transition-all"
               placeholder="Mínimo 6 caracteres">
      </div>

      <button type="submit" [disabled]="registerForm.invalid || isLoading()"
              class="w-full mt-4 py-3 bg-red-600 text-white font-bold rounded uppercase hover:bg-red-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex justify-center">
        @if (isLoading()) {
          <span class="animate-pulse">Creando cuenta...</span>
        } @else {
          <span>Unirme al Gimnasio</span>
        }
      </button>
    </form>

    <p class="mt-6 text-center text-gray-400 text-sm">
      ¿Ya sos socio? <a routerLink="/login" class="text-red-500 font-bold hover:underline">Ingresá acá</a>
    </p>
  </div>
</div>
