<section class="min-h-[80vh] bg-black text-white flex items-center justify-center px-4 py-16">
  <div class="w-full max-w-md">
    <h1 class="text-2xl font-bold text-center">Sumate a Uno%</h1>
    <p class="mt-1 text-center text-zinc-400 text-sm">
      Creá tu cuenta para empezar a entrenar
    </p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="mt-8 space-y-4">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm text-zinc-300 mb-1">Nombre</label>
          <input
            type="text"
            formControlName="firstName"
            class="w-full rounded-lg bg-zinc-950 border border-zinc-700 px-3 py-2 text-white focus:outline-none focus:border-neon-red transition"
            placeholder="Juan"
          />
        </div>
        <div>
          <label class="block text-sm text-zinc-300 mb-1">Apellido</label>
          <input
            type="text"
            formControlName="lastName"
            class="w-full rounded-lg bg-zinc-950 border border-zinc-700 px-3 py-2 text-white focus:outline-none focus:border-neon-red transition"
            placeholder="Pérez"
          />
        </div>
      </div>

      <div>
        <label class="block text-sm text-zinc-300 mb-1">Email</label>
        <input
          type="email"
          formControlName="email"
          class="w-full rounded-lg bg-zinc-950 border border-zinc-700 px-3 py-2 text-white focus:outline-none focus:border-neon-red transition"
          placeholder="tu&#64;email.com"
        />
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm text-zinc-300 mb-1">Número</label>
          <input
            type="tel"
            formControlName="phone"
            class="w-full rounded-lg bg-zinc-950 border border-zinc-700 px-3 py-2 text-white focus:outline-none focus:border-neon-red transition"
            placeholder="11 5555-5555"
          />
        </div>
        <div>
          <label class="block text-sm text-zinc-300 mb-1">DNI</label>
          <input
            type="text"
            inputmode="numeric"
            formControlName="dni"
            class="w-full rounded-lg bg-zinc-950 border border-zinc-700 px-3 py-2 text-white focus:outline-none focus:border-neon-red transition"
            placeholder="30123456"
          />
        </div>
      </div>

      <div>
        <label class="block text-sm text-zinc-300 mb-1">Fecha de nacimiento</label>
        <input
          type="date"
          formControlName="birthDate"
          class="w-full rounded-lg bg-zinc-950 border border-zinc-700 px-3 py-2 text-white focus:outline-none focus:border-neon-red transition"
        />
      </div>

      <div>
        <label class="block text-sm text-zinc-300 mb-1">Contraseña</label>
        <input
          type="password"
          formControlName="password"
          class="w-full rounded-lg bg-zinc-950 border border-zinc-700 px-3 py-2 text-white focus:outline-none focus:border-neon-red transition"
          placeholder="Mínimo 6 caracteres"
        />
      </div>

      <div>
        <label class="block text-sm text-zinc-300 mb-1">Confirmar contraseña</label>
        <input
          type="password"
          formControlName="confirmPassword"
          class="w-full rounded-lg bg-zinc-950 border border-zinc-700 px-3 py-2 text-white focus:outline-none focus:border-neon-red transition"
          placeholder="Repetí tu contraseña"
        />
        @if (form.errors?.['passwordMismatch'] && form.get('confirmPassword')?.touched) {
          <p class="mt-1 text-xs text-red-400">Las contraseñas no coinciden</p>
        }
      </div>

      @if (errorMessage()) {
        <p class="text-sm text-red-400">{{ errorMessage() }}</p>
      }

      <button
        type="submit"
        [disabled]="loading()"
        class="neon-button w-full rounded-lg px-4 py-2.5 font-semibold disabled:opacity-60"
      >
        {{ loading() ? 'Creando cuenta…' : 'Crear cuenta' }}
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-zinc-400">
      ¿Ya tenés cuenta?
      <a routerLink="/login" class="neon-text font-medium hover:underline">
        Ingresá
      </a>
    </p>
  </div>
</section>
